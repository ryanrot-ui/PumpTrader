services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: trader
      POSTGRES_DB: pumptrader
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: always

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: always

  # Nightly logical backup of the trading database
  backup:
    image: postgres:16-alpine
    entrypoint: >
      sh -c 'while true; do
        pg_dump postgresql://trader:trader@postgres:5432/pumptrader
          > /backups/pumptrader-$$(date +%F).sql;
        find /backups -name "*.sql" -mtime +14 -delete;
        sleep 86400;
      done'
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  web:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://trader:trader@postgres:5432/pumptrader
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  engine:
    build:
      context: .
      dockerfile: Dockerfile.engine
    env_file: .env
    environment:
      DATABASE_URL: postgresql://trader:trader@postgres:5432/pumptrader
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always # automatic crash recovery

volumes:
  pgdata:
  redisdata:
