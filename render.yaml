# Render Blueprint — deploys the full platform in one click:
#   web      — Next.js dashboard + API   (Docker)
#   worker   — 24/7 trading engine       (Docker)
#   database — managed Render PostgreSQL (shared by both services)
#
# Redis is OPTIONAL (the app coordinates through the database); add REDIS_URL
# later to enable the pub/sub fast path.
#
# HOW TO DEPLOY
#   1. Push this repo to GitHub.
#   2. Render dashboard → New → Blueprint → pick this repo. Render reads this file.
#   3. Click Apply. Render creates the database and wires DATABASE_URL into both
#      services automatically; NEXTAUTH_SECRET is generated for you. The
#      containers apply the Prisma schema on first boot, so no manual SQL ever.
#   4. Optional: set SOLANA_RPC_URL (+ SOLANA_WS_URL) to a dedicated provider —
#      without it the scanner is rate-limited and detects little.
#
# USING NEON (or any external PostgreSQL) INSTEAD: after Apply, replace
# DATABASE_URL on BOTH services with your connection string (Neon: paste the
# pooled URL — the containers auto-derive the direct endpoint by stripping
# "-pooler", so DIRECT_URL is only needed if your hosts differ by more).

databases:
  # Managed PostgreSQL in the same account/region as the services — no
  # third-party quota that can suspend the database out from under the app.
  - name: pumptrader-db
    plan: basic-256mb

services:
  # ── Web: dashboard + API + auth ──────────────────────────────────────────
  - type: web
    name: pumptrader-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /api/healthz
    envVars:
      - key: DATABASE_URL # wired to the managed database above (internal URL)
        fromDatabase:
          name: pumptrader-db
          property: connectionString
      - key: NEXTAUTH_SECRET # generated automatically; no action needed.
        generateValue: true
      # NEXTAUTH_URL is derived from Render's RENDER_EXTERNAL_URL automatically;
      # set it explicitly only when serving from a custom domain.
      - key: WALLET_ENCRYPTION_KEY # OPTIONAL — needed only to import a live-trading wallet. openssl rand -hex 32
        sync: false
      - key: SOLANA_RPC_URL # NEEDED FOR SCANNING (see the worker note below). Defaults to public mainnet, which won't detect tokens reliably.
        sync: false

  # ── Worker: the trading engine (runs 24/7) ───────────────────────────────
  - type: worker
    name: pumptrader-engine
    runtime: docker
    dockerfilePath: ./Dockerfile.engine
    plan: starter
    envVars:
      - key: DATABASE_URL # the SAME managed database as the web service
        fromDatabase:
          name: pumptrader-db
          property: connectionString
      - key: WALLET_ENCRYPTION_KEY # must match the web service. Required only for LIVE trading.
        sync: false
      - key: SOLANA_RPC_URL # NEEDED FOR SCANNING. The public default rejects the
        sync: false #          scanner websocket (403) and rate-limits polling, so
        #                      the token list stays empty. Use Helius/QuickNode/Triton.
      - key: SOLANA_WS_URL # Recommended with SOLANA_RPC_URL — wss endpoint for realtime detection.
        sync: false
      - key: HELIUS_API_KEY # OPTIONAL — enables holder-count metrics.
        sync: false
      - key: ANTHROPIC_API_KEY # OPTIONAL — AI meme-quality assessment.
        sync: false
      - key: TWITTER_BEARER_TOKEN # OPTIONAL — X mention counts (paid API tier).
        sync: false
